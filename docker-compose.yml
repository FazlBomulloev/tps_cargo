version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cargo_tps
      POSTGRES_USER: cargo
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cargo -d cargo_tps"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://cargo:secret@postgres:5432/cargo_tps"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY}"
      BOT_TOKEN: "${BOT_TOKEN}"
      CHANNEL_USERNAME: "${CHANNEL_USERNAME}"
      CHANNEL_URL: "${CHANNEL_URL}"
      API_BOT_SECRET: "${API_BOT_SECRET}"
      OWNER_LOGIN: "${OWNER_LOGIN}"
      OWNER_PASSWORD: "${OWNER_PASSWORD}"
      OWNER_FULL_NAME: "${OWNER_FULL_NAME}"
    volumes:
      - api_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy

  bot:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql+asyncpg://cargo:secret@postgres:5432/cargo_tps"
      BOT_TOKEN: "${BOT_TOKEN}"
      CHANNEL_USERNAME: "${CHANNEL_USERNAME}"
      CHANNEL_URL: "${CHANNEL_URL}"
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
  api_data:
